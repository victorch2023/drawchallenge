<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draw Challenge — Dibuja y califica con IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Draw Challenge</p>
        <h1>Dibuja la palabra</h1>
      </div>
      <nav class="nav-links">
        <a href="admin.html" class="nav-link">Panel de control</a>
      </nav>
    </header>

    <main class="game-layout">
      <section class="challenge-panel card">
        <p class="label">Tu reto es dibujar:</p>
        <p id="keyword-display" class="keyword-display">—</p>
        <p class="hint">Usa ratón, tacto o la cámara con tu mano.</p>
      </section>

      <section class="drawing-panel card">
        <div class="drawing-toolbar">
          <div class="mode-toggle">
            <button id="btn-mode-mouse" type="button" class="btn btn-toggle active">Ratón / Tacto</button>
            <button id="btn-mode-hand" type="button" class="btn btn-toggle">Mano (cámara)</button>
          </div>
          <div class="toolbar-actions">
            <button id="btn-clear" type="button" class="btn btn-secondary">Limpiar</button>
            <button id="btn-random" type="button" class="btn btn-secondary">Otra palabra</button>
            <button id="btn-submit" type="button" class="btn btn-primary">Entregar dibujo</button>
          </div>
        </div>

        <div id="canvas-wrapper" class="canvas-wrapper">
          <canvas id="drawing-canvas" aria-label="Lienzo de dibujo"></canvas>
          <div id="hand-pointer" class="hand-pointer hidden" aria-hidden="true"></div>
        </div>

        <div class="webcam-container">
          <video id="webcam" autoplay playsinline muted aria-label="Vista previa de cámara"></video>
          <p class="webcam-hint">La cámara solo se usa en modo mano.</p>
        </div>
      </section>

      <section id="result-panel" class="result-panel card" hidden>
        <p class="label">Veredicto de Gemini</p>
        <div class="score-ring">
          <span id="result-score" class="score-value">—</span>
          <span class="score-max">/ 10</span>
        </div>
        <p id="result-reason" class="result-reason"></p>
      </section>
    </main>

    <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
