<!DOCTYPE html>
<html lang="es" class="game-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fffdf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Draw Challenge — Dibuja y califica con IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="game-page">
  <div class="game-shell">
    <header class="game-topbar">
      <div class="topbar-title">
        <span class="eyebrow">Draw Challenge</span>
      </div>
      <a href="admin.html" class="nav-link nav-link-compact">Panel</a>
    </header>

    <section class="keyword-bar">
      <div class="keyword-main">
        <p class="label">Dibuja:</p>
        <p id="keyword-display" class="keyword-display">—</p>
        <p id="word-hint" class="word-hint" hidden></p>
      </div>
      <div class="mode-switch" role="group" aria-label="Modo de juego">
        <button id="btn-mode-gemini" type="button" class="btn btn-mode active">Gemini elige</button>
        <button id="btn-mode-manual" type="button" class="btn btn-mode">Mi lista</button>
      </div>
    </section>

    <div class="canvas-stage">
      <div class="canvas-wrapper">
        <canvas id="drawing-canvas" aria-label="Lienzo de dibujo"></canvas>
      </div>
    </div>

    <footer class="game-dock">
      <div class="toolbar-actions">
        <button id="btn-new-word" type="button" class="btn btn-secondary">Nueva palabra</button>
        <button id="btn-clear" type="button" class="btn btn-secondary">Limpiar</button>
        <button id="btn-submit" type="button" class="btn btn-primary">Entregar</button>
      </div>
      <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    </footer>

    <section id="result-panel" class="result-sheet" hidden>
      <div class="result-sheet-inner card">
        <p class="label">Veredicto de Gemini</p>
        <div class="score-ring">
          <span id="result-score" class="score-value">—</span>
          <span class="score-max">/ 10</span>
        </div>
        <p id="result-reason" class="result-reason"></p>
        <button id="btn-next-round" type="button" class="btn btn-primary">Siguiente palabra</button>
      </div>
    </section>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
